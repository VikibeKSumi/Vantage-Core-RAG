
services:
  app:
    build: .
    depends_on:
      - qdrant
      - redis
    env_file:
      - .env
    ports: 
      - "8000:8000"
  
  qdrant:
    image: qdrant/qdrant
    volumes:
      - ./data/qdrant_storage:/qdrant/storage # bind mount
    ports:
      - "6333:6333"

  redis:
    image: redis
    ports:
      - "6379:6379"
